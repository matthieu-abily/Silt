<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silt Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Futura, "Avenir Next", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fbfaf7;
      color: #20232a;
    }
    .card {
      max-width: 520px;
      padding: 28px;
      border: 1px solid #e7e3da;
      border-radius: 24px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 18px 60px rgba(27,31,36,.08);
    }
    img { width: 72px; height: 72px; border-radius: 18px; }
    h1 { margin: 18px 0 8px; font-size: 28px; }
    p { line-height: 1.55; color: #5f6470; }
    code { background: #f2efff; color: #6d44dc; padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <main class="card">
    <img src="./icons/icon-180.png" alt="Silt icon">
    <h1>Silt is offline</h1>
    <p>The app shell should be cached for offline use. If this page appears instead of the board, open Silt once while online from the installed Home Screen app so the cache can refresh.</p>
  </main>
</body>
</html>
